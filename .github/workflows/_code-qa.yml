name: Code QA
on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      node-version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ inputs.cache-key }}

      - name: Build project (eslint.config.js imports itself)
        run: npm run build

      - name: Run linting
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ inputs.cache-key }}

      - name: Build project (eslint.config.js is importing itself and is typechecked)
        run: npm run build

      - name: Run type checking
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ inputs.cache-key }}

      - name: Run tests with coverage
        run: |
          TSX_TSCONFIG_PATH=.tsconfig/tests.json \
          npx c8 --100 --exclude='src/**/*.test.ts' --exclude='src/**/*.estest.ts' \
            node --import tsx --test \
              --test-reporter=spec --test-reporter-destination=stdout \
              --test-reporter=junit --test-reporter-destination=test-results.xml \
              'src/**/*.test.ts' 'src/**/*.estest.ts'

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
